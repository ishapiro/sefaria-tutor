name = "sefaria-tutor"
main = ".output/server/index.mjs"
compatibility_date = "2024-09-19"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "sefaria-tutor-db"
database_id = "c89e48ee-42ac-46c3-8950-3f71e4c947c2"

[[r2_buckets]]
binding = "PRONUNCIATION_CACHE"
bucket_name = "sefaria-tutor-pronunciations"

[vars]
NUXT_PUBLIC_TURNSTILE_SITE_KEY = "0x4AAAAAACZzAyzFuLdSmQhT"

[observability]
[observability.logs]
enabled = true
invocation_logs = true

[[routes]]
pattern = "sefaria-tutor.cogitations.com"
custom_domain = true

[[routes]]
pattern = "shoresh.cogitations.com"
custom_domain = true
